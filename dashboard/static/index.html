<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Center Dashboard</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  .header select {
    background: #0d1117;
    color: #e1e4e8;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 14px;
    min-width: 240px;
  }
  .header select:focus { outline: none; border-color: #58a6ff; }
  .conn-status {
    margin-left: auto;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #6c757d;
  }
  .conn-dot.connected { background: #198754; }
  .conn-dot.error { background: #dc3545; }

  /* ── Sponsor badges ── */
  .sponsor-badges {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 0.3px;
  }
  .badge-bland { background: #1a3a5c; color: #58a6ff; border: 1px solid #264f78; }
  .badge-aerospike { background: #1a3d1a; color: #6fdc8c; border: 1px solid #2d5a2d; }
  .badge-auth0 { background: #3d2a1a; color: #f5a623; border: 1px solid #5a3d1a; }

  /* ── Banners ── */
  .banner {
    display: none;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .banner.visible { display: flex; }
  .banner-escalation {
    background: rgba(220, 53, 69, 0.15);
    border-bottom: 2px solid #dc3545;
    color: #f88;
  }
  .banner-completion {
    background: rgba(25, 135, 84, 0.15);
    border-bottom: 2px solid #198754;
    color: #6fdc8c;
  }
  .banner-text { flex: 1; }
  .banner-close {
    background: none; border: none; color: inherit;
    font-size: 18px; cursor: pointer; padding: 0 4px;
    opacity: 0.7;
  }
  .banner-close:hover { opacity: 1; }
  .banner a { color: inherit; text-decoration: underline; cursor: pointer; }

  /* ── Main grid ── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
    background: #30363d;
    min-height: 0;
  }

  .panel {
    background: #0d1117;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-header {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #8b949e;
    border-bottom: 1px solid #21262d;
    flex-shrink: 0;
  }
  .panel-body { flex: 1; min-height: 0; position: relative; }

  /* Transcript spans full bottom row */
  .panel-transcript { grid-column: 1 / -1; }

  /* ── Graphs ── */
  .graph-container { width: 100%; height: 100%; }

  /* ── Transcript ── */
  .transcript-scroll {
    height: 100%;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .transcript-scroll::-webkit-scrollbar { width: 6px; }
  .transcript-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  .msg {
    max-width: 75%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.45;
    word-wrap: break-word;
  }
  .msg-user {
    align-self: flex-start;
    background: #21262d;
    border-bottom-left-radius: 4px;
  }
  .msg-assistant {
    align-self: flex-end;
    background: #1a3a5c;
    border-bottom-right-radius: 4px;
  }
  .msg-role {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 2px;
    color: #8b949e;
  }
  .msg-turn {
    font-size: 10px;
    color: #6e7681;
    margin-top: 4px;
  }

  .node-indicator {
    align-self: center;
    background: rgba(13, 110, 253, 0.12);
    border: 1px dashed #0d6efd;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    color: #58a6ff;
    text-align: center;
  }
  .node-indicator .fields { font-weight: 600; }
  .node-indicator .questions {
    font-size: 11px;
    color: #8b949e;
    margin-top: 2px;
  }

  /* ── Empty state ── */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #484f58;
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>Call Center Dashboard</h1>
  <div class="sponsor-badges">
    <span class="badge badge-bland">Bland AI</span>
    <span class="badge badge-aerospike">Aerospike</span>
    <span class="badge badge-auth0">Auth0</span>
  </div>
  <select id="session-select">
    <option value="">-- Select a session --</option>
  </select>
  <div class="conn-status">
    <div id="conn-dot" class="conn-dot"></div>
    <span id="conn-label">Disconnected</span>
  </div>
</div>

<!-- Banners -->
<div id="banner-escalation" class="banner banner-escalation">
  <span class="banner-text" id="escalation-text"></span>
  <button class="banner-close" onclick="this.parentElement.classList.remove('visible')">&times;</button>
</div>
<div id="banner-completion" class="banner banner-completion">
  <span class="banner-text" id="completion-text"></span>
  <a id="completion-transcript-link">View Transcript</a>
  <button class="banner-close" onclick="this.parentElement.classList.remove('visible')">&times;</button>
</div>

<!-- Main panels -->
<div class="main">
  <div class="panel">
    <div class="panel-header">IVR Call Tree</div>
    <div class="panel-body">
      <div id="calltree-graph" class="graph-container">
        <div class="empty-state">Loading call tree...</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">Workflow Progress</div>
    <div class="panel-body">
      <div id="workflow-graph" class="graph-container">
        <div class="empty-state">Select a session to view workflow progress</div>
      </div>
    </div>
  </div>

  <div class="panel panel-transcript">
    <div class="panel-header">Transcript</div>
    <div class="panel-body">
      <div id="transcript" class="transcript-scroll">
        <div class="empty-state">Select a session to view the transcript</div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
